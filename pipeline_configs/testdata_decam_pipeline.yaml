# RIPPLe Configuration for DECam test data

# --- Butler Configuration ---
butler: {}

# --- Data Source Configuration ---
data_source:
  type: "butler_repo"
  data_release: dp02
  path: "data/testdata_decam"
  collections:
    - "DECam/calibrations" # This is a guess, may need adjustment

# --- Instrument Configuration ---
instrument:
  name: "DECam"
  class_name: "lsst.obs.decam.DarkEnergyCamera"

# --- Data Access Configuration ---
data_access:
  cache_path: ".ripple_cache"
  clear_cache: true

# --- Preprocessing Configuration ---
preprocessing:
  steps:
    - name: "cutout_creator"
      params:
        cutout_size: 32
    - name: "image_normalizer"
      params:
        norm_type: "min_max"

# --- Model Configuration ---
model:
  name: "base_model"
  params:
    learning_rate: 0.01
  trainer:
    epochs: 1
    batch_size: 8