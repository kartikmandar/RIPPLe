# RIPPLe Configuration for the main Butler Repository (HSC data)

# --- Data Source Configuration ---
data_source:
  type: butler_repo
  data_release: dp02
  path: "data/butler_repo"
  collections:
    - "HSC/runs/RC2/w_2023_33/DM-39971"
  create_if_missing: true

# --- Butler Configuration ---
butler:
  standalone: false
  override: false
  registry_db: sqlite

# --- Instrument Configuration ---
instrument:
  name: "HSC"
  class_name: "lsst.obs.base.Camera"

# --- Data Access Configuration ---
data_access:
  cache_path: ".ripple_cache"
  clear_cache: false

# --- Preprocessing Configuration ---
preprocessing:
  steps:
    - name: "cutout_creator"
      params:
        cutout_size: 128
    - name: "image_normalizer"
      params:
        norm_type: "min_max"

# --- Model Configuration ---
model:
  name: "base_model"
  params:
    learning_rate: 0.001
  trainer:
    epochs: 10
    batch_size: 32