# RIPPLe Configuration for RC2 subset test data

# --- Butler Configuration ---
butler: {}

# --- Data Source Configuration ---
data_source:
  type: "butler_repo"
  data_release: dp02
  path: "data/rc2_subset"
  collections:
    - "2.2i/runs/DP0.2/w_2021_38/PREOPS-1652" # May need adjustment

# --- Instrument Configuration ---
instrument:
  name: "LSSTCam-imSim"
  class_name: "lsst.obs.lsst.LsstCam"

# --- Data Access Configuration ---
data_access:
  cache_path: ".ripple_cache"
  clear_cache: true

# --- Preprocessing Configuration ---
preprocessing:
  steps:
    - name: "cutout_creator"
      params:
        cutout_size: 128
    - name: "image_normalizer"
      params:
        norm_type: "min_max"

# --- Model Configuration ---
model:
  name: "base_model"
  params:
    learning_rate: 0.005
  trainer:
    epochs: 10
    batch_size: 32